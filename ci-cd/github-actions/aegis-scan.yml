# Atlas Synapse Aegis Prime Auditor — GitHub Actions CI plugin
# Installation: Copy this file to .github/workflows/aegis-security-scan.yml in your repository
#
# Setup:
# 1. Go to Settings → Secrets and variables → Actions
# 2. Add secret: AEGIS_BACKEND_URL (e.g., https://your-codespace-url:8000 or https://your-railway.app)
# 3. Add secret: AEGIS_API_KEY (optional, for authentication)

name: Aegis Security Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.java'
      - '**.go'
      - '**.rs'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Aegis Security Scan
        id: scan
        env:
          AEGIS_BACKEND_URL: ${{ secrets.AEGIS_BACKEND_URL }}
          AEGIS_API_KEY: ${{ secrets.AEGIS_API_KEY }}
        run: |
          # Check backend is reachable
          if ! curl -m 10 -s "$AEGIS_BACKEND_URL/" > /dev/null; then
            echo "❌ Backend unreachable at $AEGIS_BACKEND_URL"
            echo "Set AEGIS_BACKEND_URL secret in Settings → Secrets and variables → Actions"
            exit 1
          fi

          # Collect files for scanning (limit to 30)
          FILES=$(find . \
            -type f \
            -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.tsx" \
            -o -name "*.java" -o -name "*.go" -o -name "*.rs" \
            -o -name "*.sh" -o -name "*.yaml" -o -name "*.yml" \
            2>/dev/null | grep -v node_modules | grep -v .git | head -30)

          # Skip if no files found
          if [ -z "$FILES" ]; then
            echo "⚠️ No scannable files found"
            echo "risk_level=UNKNOWN" >> $GITHUB_OUTPUT
            echo "risk_score=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Build multipart form data
          FORM_DATA=""
          for file in $FILES; do
            FORM_DATA="$FORM_DATA -F files=@$file"
          done

          # Call Aegis Backend API
          RESPONSE=$(curl -s -X POST \
            -H "X-API-Key: ${AEGIS_API_KEY:-}" \
            $FORM_DATA \
            "$AEGIS_BACKEND_URL/api/scan" \
            -w "\n%{http_code}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          # Check HTTP status
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Scan failed (HTTP $HTTP_CODE)"
            echo "$BODY" | head -50
            exit 1
          fi

          # Save full result
          echo "$BODY" > scan_result.json

          # Parse results with jq fallback
          if command -v jq &> /dev/null; then
            RISK=$(echo "$BODY" | jq -r '.ai_analysis.risk_level // "UNKNOWN"' 2>/dev/null || echo "UNKNOWN")
            SCORE=$(echo "$BODY" | jq -r '.ai_analysis.risk_score // 0' 2>/dev/null || echo "0")
            TOTAL=$(echo "$BODY" | jq -r '.total_findings // 0' 2>/dev/null || echo "0")
            CRITICAL=$(echo "$BODY" | jq -r '.severity_breakdown.CRITICAL // 0' 2>/dev/null || echo "0")
            HIGH=$(echo "$BODY" | jq -r '.severity_breakdown.HIGH // 0' 2>/dev/null || echo "0")
          else
            RISK="UNKNOWN"
            SCORE="0"
            TOTAL="0"
            CRITICAL="0"
            HIGH="0"
          fi

          # Set outputs
          echo "risk_level=$RISK" >> $GITHUB_OUTPUT
          echo "risk_score=$SCORE" >> $GITHUB_OUTPUT
          echo "total_findings=$TOTAL" >> $GITHUB_OUTPUT
          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH" >> $GITHUB_OUTPUT

          # Echo summary
          echo "✅ Scan complete"
          echo "Risk: $RISK ($SCORE/100)"
          echo "Findings: $TOTAL (Critical: $CRITICAL, High: $HIGH)"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.scan.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const risk = '${{ steps.scan.outputs.risk_level }}';
            const score = '${{ steps.scan.outputs.risk_score }}';
            const total = '${{ steps.scan.outputs.total_findings }}';
            const critical = '${{ steps.scan.outputs.critical_count }}';
            const high = '${{ steps.scan.outputs.high_count }}';

            const emoji = risk === 'CRITICAL' ? '🔴' :
                         risk === 'HIGH' ? '🟠' :
                         risk === 'MEDIUM' ? '🟡' : '🟢';

            const body = `## ${emoji} Aegis Security Scan Results

| Metric | Value |
|--------|-------|
| **Risk Level** | ${risk} |
| **Risk Score** | ${score}/100 |
| **Total Findings** | ${total} |
| **Critical** | ${critical} |
| **High** | ${high} |

${critical > 0 ? '⛔ **CRITICAL issues must be fixed before merge**' : ''}
${high > 0 && critical === 0 ? '⚠️ **HIGH severity issues require review**' : ''}
${critical === 0 && high === 0 ? '✅ **No critical security issues**' : ''}

---
*Powered by Atlas Synapse Auditor • Trust Engine for AI Systems*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Block Merge on Critical Risk
        if: steps.scan.outputs.risk_level == 'CRITICAL' || steps.scan.outputs.critical_count > 0
        run: |
          echo "❌ Build blocked: CRITICAL security issues detected"
          exit 1

      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-scan-results
          path: scan_result.json
          retention-days: 30
          if-no-files-found: ignore

