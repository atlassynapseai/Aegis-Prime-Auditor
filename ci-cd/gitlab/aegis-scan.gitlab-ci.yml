# ci-cd/gitlab/aegis-scan.gitlab-ci.yml
#
# GitLab CI template — Aegis Prime Security Scan
#
# Include this template in your project's .gitlab-ci.yml:
#
#   include:
#     - project: 'atlassynapseai/aegis-prime-auditor'
#       file: 'ci-cd/gitlab/aegis-scan.gitlab-ci.yml'
#
# Or copy it directly and set these CI/CD variables in your GitLab project:
#   AEGIS_API_URL  — Railway backend URL, e.g. https://aegis-xxxx.up.railway.app
#   AEGIS_API_KEY  — API key configured on the Railway backend

stages:
  - security

# ── Aegis Security Scan ────────────────────────────────────────────────────────
aegis-security-scan:
  stage: security
  image: alpine:3.19
  
  variables:
    # Override these in your project's CI/CD → Variables settings
    AEGIS_API_URL: "${AEGIS_API_URL}"
    AEGIS_API_KEY: "${AEGIS_API_KEY}"
    SCAN_FAIL_ON_CRITICAL: "true"
    SCAN_RISK_THRESHOLD: "80"

  before_script:
    - apk add --no-cache curl jq zip ca-certificates

  script:
    # ── Bundle source files ──────────────────────────────────────────────────
    - |
      echo "📦 Bundling source files..."
      zip -r /tmp/aegis-payload.zip . \
        --include "*.py" "*.js" "*.ts" "*.jsx" "*.tsx" \
                  "*.java" "*.go" "*.rb" "*.php" "*.c" "*.cpp" "*.cs" \
                  "*.html" "*.htm" "*.xml" "*.json" "*.yaml" "*.yml" \
                  "*.sh" "*.md" \
        -x ".git/*" "node_modules/*" ".venv/*" "__pycache__/*" || true
      echo "Payload: $(du -sh /tmp/aegis-payload.zip | cut -f1)"

    # ── Validate required variables ──────────────────────────────────────────
    - |
      if [ -z "$AEGIS_API_URL" ]; then
        echo "ERROR: AEGIS_API_URL is not set. Add it as a CI/CD variable."
        exit 1
      fi

    # ── Submit scan ──────────────────────────────────────────────────────────
    - |
      echo "🔍 Submitting scan to Aegis backend..."
      HTTP_CODE=$(curl -s -o aegis-result.json -w "%{http_code}" \
        -X POST "${AEGIS_API_URL}/api/scan" \
        -H "X-API-Key: ${AEGIS_API_KEY}" \
        -F "files=@/tmp/aegis-payload.zip" \
        --max-time 300)

      echo "HTTP status: $HTTP_CODE"
      if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
        echo "ERROR: Aegis API returned HTTP $HTTP_CODE"
        cat aegis-result.json || true
        exit 1
      fi

    # ── Parse & display results ──────────────────────────────────────────────
    - |
      TOTAL=$(jq '.total_findings // 0' aegis-result.json)
      RISK=$(jq '.ai_analysis.risk_score // 0' aegis-result.json)
      LEVEL=$(jq -r '.ai_analysis.risk_level // "UNKNOWN"' aegis-result.json)
      CRITICAL=$(jq '.severity_breakdown.CRITICAL // 0' aegis-result.json)
      HIGH=$(jq '.severity_breakdown.HIGH // 0' aegis-result.json)
      SCAN_ID=$(jq -r '.scan_id // "unknown"' aegis-result.json)

      echo "════════════════════════════════════════"
      echo "  AEGIS PRIME SECURITY SCAN RESULTS"
      echo "════════════════════════════════════════"
      echo "  Scan ID    : $SCAN_ID"
      echo "  Risk Score : $RISK / 100"
      echo "  Risk Level : $LEVEL"
      echo "  Total      : $TOTAL findings"
      echo "  CRITICAL   : $CRITICAL"
      echo "  HIGH       : $HIGH"
      echo "════════════════════════════════════════"

      echo ""
      echo "Top findings:"
      jq -r '.all_findings[:5][] | "  [\(.severity)] \(.engine): \(.message) — \(.file)"' \
        aegis-result.json 2>/dev/null || echo "  (none)"

      # ── Enforce gates ──────────────────────────────────────────────────────
      FAIL=0
      if [ "$SCAN_FAIL_ON_CRITICAL" = "true" ] && [ "$CRITICAL" -gt 0 ]; then
        echo ""
        echo "❌ GATE FAILED: $CRITICAL CRITICAL finding(s) — pipeline blocked."
        FAIL=1
      fi
      if [ "$RISK" -ge "$SCAN_RISK_THRESHOLD" ]; then
        echo ""
        echo "❌ GATE FAILED: Risk score $RISK >= threshold $SCAN_RISK_THRESHOLD — pipeline blocked."
        FAIL=1
      fi
      if [ "$FAIL" -eq 0 ]; then
        echo ""
        echo "✅ All security gates passed."
      fi
      exit $FAIL

  artifacts:
    name: "aegis-scan-${CI_COMMIT_SHORT_SHA}"
    paths:
      - aegis-result.json
    reports:
      # Expose as a downloadable artifact in the pipeline UI
      dotenv: /dev/null
    when: always
    expire_in: 30 days

  # Run on every branch; adjust rules to your project's needs
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
