# Atlas Synapse Security Scan â€” GitHub Actions Workflow
# Scans code and blocks merge on critical security issues
#
# Setup Instructions:
# 1. Copy this file to: .github/workflows/atlas-security-scan.yml
# 2. Go to Settings â†’ Secrets and variables â†’ Actions
# 3. Add secret: AEGIS_BACKEND_URL
#    Example: https://your-codespace-8000.app.github.dev
# 4. (Optional) Add secret: AEGIS_API_KEY if your backend requires authentication

name: Atlas Synapse Security Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Aegis Security Scan
        id: scan
        env:
          AEGIS_BACKEND_URL: ${{ secrets.AEGIS_BACKEND_URL }}
          AEGIS_API_KEY: ${{ secrets.AEGIS_API_KEY }}
        run: |
          # Validate backend URL is configured
          if [ -z "$AEGIS_BACKEND_URL" ]; then
            echo "âťŚ AEGIS_BACKEND_URL secret not set"
            echo "Configure in Settings â†’ Secrets and variables â†’ Actions"
            exit 1
          fi

          # Check backend is reachable
          if ! curl -m 10 -s "$AEGIS_BACKEND_URL/" > /dev/null 2>&1; then
            echo "âťŚ Backend unreachable at: $AEGIS_BACKEND_URL"
            exit 1
          fi

          # Find scannable files (limit to 25 to avoid timeouts)
          FILES=$(find . \
            -type f \( \
              -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.tsx" \
              -o -name "*.java" -o -name "*.go" -o -name "*.rs" \
            \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" \
            2>/dev/null | head -25)

          if [ -z "$FILES" ]; then
            echo "âš ď¸Ź  No scannable files found"
            echo "risk_level=UNKNOWN" >> $GITHUB_OUTPUT
            echo "risk_score=0" >> $GITHUB_OUTPUT
            echo "total_findings=0" >> $GITHUB_OUTPUT
            echo "critical_count=0" >> $GITHUB_OUTPUT
            echo "high_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Build curl multipart form data
          CURL_ARGS=""
          for file in $FILES; do
            CURL_ARGS="$CURL_ARGS -F files=@$file"
          done

          # Call Aegis backend API
          RESPONSE=$(curl -s -X POST \
            -H "X-API-Key: ${AEGIS_API_KEY:-}" \
            $CURL_ARGS \
            "$AEGIS_BACKEND_URL/api/scan" \
            -w "\n%{http_code}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          # Check HTTP response
          if [ "$HTTP_CODE" != "200" ]; then
            echo "âťŚ Scan failed (HTTP $HTTP_CODE)"
            echo "$BODY" | head -20
            exit 1
          fi

          # Save results
          echo "$BODY" > scan_result.json

          # Parse JSON response
          if command -v jq &> /dev/null; then
            RISK=$(echo "$BODY" | jq -r '.ai_analysis.risk_level // "UNKNOWN"' 2>/dev/null || echo "UNKNOWN")
            SCORE=$(echo "$BODY" | jq -r '.ai_analysis.risk_score // 0' 2>/dev/null || echo "0")
            TOTAL=$(echo "$BODY" | jq -r '.total_findings // 0' 2>/dev/null || echo "0")
            CRITICAL=$(echo "$BODY" | jq -r '.severity_breakdown.CRITICAL // 0' 2>/dev/null || echo "0")
            HIGH=$(echo "$BODY" | jq -r '.severity_breakdown.HIGH // 0' 2>/dev/null || echo "0")
          else
            RISK="UNKNOWN"
            SCORE="0"
            TOTAL="0"
            CRITICAL="0"
            HIGH="0"
          fi

          # Set outputs for next steps
          echo "risk_level=$RISK" >> $GITHUB_OUTPUT
          echo "risk_score=$SCORE" >> $GITHUB_OUTPUT
          echo "total_findings=$TOTAL" >> $GITHUB_OUTPUT
          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH" >> $GITHUB_OUTPUT

          # Log summary
          echo "âś… Scan Complete"
          echo "Risk: $RISK ($SCORE/100)"
          echo "Findings: $TOTAL (Critical: $CRITICAL, High: $HIGH)"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.scan.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const risk = '${{ steps.scan.outputs.risk_level }}';
            const score = '${{ steps.scan.outputs.risk_score }}';
            const total = '${{ steps.scan.outputs.total_findings }}';
            const critical = '${{ steps.scan.outputs.critical_count }}';
            const high = '${{ steps.scan.outputs.high_count }}';

            const emoji = risk === 'CRITICAL' ? 'đź”´' :
                         risk === 'HIGH' ? 'đźź ' :
                         risk === 'MEDIUM' ? 'đźźˇ' : 'đźź˘';

            const body = `## ${emoji} Atlas Synapse Security Scan

| Metric | Value |
|--------|-------|
| **Risk Level** | ${risk} |
| **Risk Score** | ${score}/100 |
| **Total Findings** | ${total} |
| **Critical** | ${critical} |
| **High** | ${high} |

${critical > 0 ? 'â›” **CRITICAL issues must be fixed before merge**' : ''}
${high > 0 && critical == 0 ? 'âš ď¸Ź **HIGH severity issues require review**' : ''}
${critical == 0 && high == 0 ? 'âś… **No critical security issues detected**' : ''}

---
*Powered by Atlas Synapse Auditor â€˘ Trust Engine for AI Systems*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Block Merge on Critical Risk
        if: steps.scan.outputs.risk_level == 'CRITICAL' || steps.scan.outputs.critical_count > 0
        run: |
          echo "âťŚ Build blocked: CRITICAL security risks detected"
          exit 1

      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-security-scan-results
          path: scan_result.json
          retention-days: 30
          if-no-files-found: ignore
