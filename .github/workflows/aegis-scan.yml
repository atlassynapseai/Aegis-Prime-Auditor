name: Atlas Synapse Security Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: |
          cd backend
          pip install fastapi uvicorn openai python-multipart --quiet
          pip install semgrep --quiet
      
      - name: Create Required Modules
        run: |
          cd backend
          
          # Create minimal background_processor.py
          cat > background_processor.py << 'EOF'
class FilePrioritizer:
    @classmethod
    def filter_scannable(cls, files, max_files=15):
        return files[:max_files]

class BackgroundScanManager:
    def __init__(self):
        self.tasks = {}
    def get_status(self, scan_id):
        return {"status": "not_found"}

background_manager = BackgroundScanManager()
EOF
          
          # Create minimal file_parsers.py
          cat > file_parsers.py << 'EOF'
from pathlib import Path

class FileParser:
    @staticmethod
    def get_scannable_content(path):
        try:
            with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                return f.read()
        except:
            return ""
EOF
          
          # Create minimal sbom_compliance.py
          cat > sbom_compliance.py << 'EOF'
class SBOMGenerator:
    @staticmethod
    def generate(scan_result):
        return {"bomFormat": "CycloneDX", "components": []}

class ComplianceMapper:
    FRAMEWORKS = {}
    @staticmethod
    def map_findings_to_compliance(findings):
        return {"frameworks": {}, "overall_status": {}}
EOF
          
          # Create minimal pdf_generator.py
          cat > pdf_generator.py << 'EOF'
class ReportGenerator:
    @staticmethod
    def generate_executive_markdown(scan, compliance):
        return "# Report"
    @staticmethod
    def generate_html_report(scan, compliance):
        return "<html><body>Report</body></html>"
EOF
      
      - name: Run Security Scan on Test Files
        env:
          OPENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
        run: |
          cd backend
          python orchestrator.py &
          BACKEND_PID=$!
          
          sleep 12
          
          # Test health endpoint
          curl http://localhost:10000/ -s || echo "Backend starting..."
          sleep 3
          
          # Scan test files only
          cd ../tests
          for file in *.py; do
            if [ -f "$file" ]; then
              echo "Scanning: $file"
              curl -X POST http://localhost:10000/api/scan \
                -F "file=@$file" \
                -o "../scan_$file.json" \
                -s || true
            fi
          done
          
          cd ..
          kill $BACKEND_PID 2>/dev/null || true
          sleep 2
      
      - name: Analyze Results
        id: analyze
        run: |
          TOTAL=0
          CRIT=0
          HIGH=0
          
          for f in scan_*.json; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              T=$(jq -r '.total_findings // 0' "$f" 2>/dev/null || echo 0)
              C=$(jq -r '.severity_breakdown.CRITICAL // 0' "$f" 2>/dev/null || echo 0)
              H=$(jq -r '.severity_breakdown.HIGH // 0' "$f" 2>/dev/null || echo 0)
              
              TOTAL=$((TOTAL + T))
              CRIT=$((CRIT + C))
              HIGH=$((HIGH + H))
            fi
          done
          
          echo "total_findings=$TOTAL" >> $GITHUB_OUTPUT
          echo "critical=$CRIT" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          
          if [ $CRIT -gt 0 ]; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
          elif [ $HIGH -gt 3 ]; then
            echo "status=WARNING" >> $GITHUB_OUTPUT
          else
            echo "status=PASSED" >> $GITHUB_OUTPUT
          fi
          
          echo "## Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Total Findings: $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- Critical: $CRIT" >> $GITHUB_STEP_SUMMARY
          echo "- High: $HIGH" >> $GITHUB_STEP_SUMMARY
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ steps.analyze.outputs.total_findings }}';
            const critical = '${{ steps.analyze.outputs.critical }}';
            const high = '${{ steps.analyze.outputs.high }}';
            const status = '${{ steps.analyze.outputs.status }}';
            
            const statusEmoji = status === 'PASSED' ? '✅' : status === 'WARNING' ? '⚠️' : '❌';
            
            const comment = `## ${statusEmoji} Atlas Synapse Security Scan Results

**Status:** ${status}  
**Total Findings:** ${total}  
**Critical:** ${critical}  
**High:** ${high}

${critical > 0 ? '⛔ **CRITICAL vulnerabilities must be remediated before merge**' : ''}
${high > 3 ? '⚠️ **HIGH severity issues require review**' : ''}
${status === 'PASSED' ? '🎉 **No critical security issues detected**' : ''}

---
*Powered by Atlas Synapse Auditor v3.0 • Trust Engine for AI Systems*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-security-scan-results
          path: scan_*.json
          retention-days: 30
          if-no-files-found: ignore
