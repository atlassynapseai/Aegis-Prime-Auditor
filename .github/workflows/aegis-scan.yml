name: Aegis Prime Security Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Aegis Prime Backend
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Install Scanning Engines
        run: |
          # Semgrep
          pip install semgrep
          
          # Gitleaks
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          
          # Trivy
          wget -q https://github.com/aquasecurity/trivy/releases/download/v0.50.1/trivy_0.50.1_Linux-64bit.tar.gz
          tar -xzf trivy_0.50.1_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/
          trivy image --download-db-only
      
      - name: Run Aegis Prime Scan
        env:
          OPENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
        run: |
          # Scan all Python files
          find . -name "*.py" -not -path "./venv/*" -not -path "./.git/*" | while read file; do
            echo "Scanning: $file"
            curl -X POST http://localhost:8000/api/scan \
              -F "file=@$file" \
              -o "scan_${file//\//_}.json" || true
          done &
          
          # Start backend
          cd backend
          python orchestrator.py &
          BACKEND_PID=$!
          
          # Wait for backend to be ready
          sleep 10
          
          # Wait for scans to complete
          wait
          
          # Stop backend
          kill $BACKEND_PID
      
      - name: Parse Results and Create Summary
        id: parse_results
        run: |
          # Aggregate all scan results
          TOTAL_FINDINGS=0
          CRITICAL=0
          HIGH=0
          
          for result_file in scan_*.json; do
            if [ -f "$result_file" ]; then
              FINDINGS=$(jq '.total_findings // 0' "$result_file")
              CRIT=$(jq '.severity_breakdown.CRITICAL // 0' "$result_file")
              HI=$(jq '.severity_breakdown.HIGH // 0' "$result_file")
              
              TOTAL_FINDINGS=$((TOTAL_FINDINGS + FINDINGS))
              CRITICAL=$((CRITICAL + CRIT))
              HIGH=$((HIGH + HI))
            fi
          done
          
          echo "total_findings=$TOTAL_FINDINGS" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          
          # Determine pass/fail
          if [ $CRITICAL -gt 0 ]; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
            exit 1
          elif [ $HIGH -gt 5 ]; then
            echo "status=WARNING" >> $GITHUB_OUTPUT
          else
            echo "status=PASSED" >> $GITHUB_OUTPUT
          fi
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ steps.parse_results.outputs.total_findings }}';
            const critical = '${{ steps.parse_results.outputs.critical }}';
            const high = '${{ steps.parse_results.outputs.high }}';
            const status = '${{ steps.parse_results.outputs.status }}';
            
            const statusEmoji = status === 'PASSED' ? '✅' : status === 'WARNING' ? '⚠️' : '❌';
            
            const comment = `## ${statusEmoji} Aegis Prime Security Scan Results
            
**Status:** ${status}  
**Total Findings:** ${total}  
**Critical:** ${critical}  
**High:** ${high}

${critical > 0 ? '⛔ **CRITICAL vulnerabilities must be remediated before merge.**' : ''}
${high > 5 ? '⚠️ **Multiple HIGH severity issues detected. Review recommended.**' : ''}
${total == 0 ? '🎉 **No security issues detected!**' : ''}

<details>
<summary>View Detailed Results</summary>

Scan powered by **Aegis Prime Auditor v2.0**  
Engines: Semgrep, Gitleaks, Trivy, CodeQL + Gemini AI

</details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: aegis-prime-scan-results
          path: scan_*.json
          retention-days: 30
      
      - name: Fail Build on Critical Findings
        if: steps.parse_results.outputs.critical > 0
        run: |
          echo "::error::CRITICAL security vulnerabilities detected. Build failed."
          exit 1

# Optional: Upload to GitHub Code Scanning (requires SARIF format)
