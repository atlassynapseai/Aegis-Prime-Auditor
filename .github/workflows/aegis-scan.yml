name: Aegis Prime Security Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Install Scanning Engines
        run: |
          pip install semgrep
          
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          
          wget -q https://github.com/aquasecurity/trivy/releases/download/v0.50.1/trivy_0.50.1_Linux-64bit.tar.gz
          tar -xzf trivy_0.50.1_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/
          trivy image --download-db-only
      
      - name: Start Backend and Run Scans
        env:
          OPENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
        run: |
          cd backend
          python orchestrator.py &
          BACKEND_PID=$!
          
          sleep 10
          
          cd ..
          find . -name "*.py" -not -path "./venv/*" -not -path "./.git/*" -not -path "./backend/*" | while read file; do
            echo "Scanning: $file"
            curl -X POST http://localhost:8000/api/scan -F "file=@$file" -o "scan_${file//\//_}.json" 2>/dev/null || true
          done
          
          kill $BACKEND_PID 2>/dev/null || true
      
      - name: Parse Results
        id: parse_results
        run: |
          TOTAL=0
          CRIT=0
          HIGH=0
          
          for f in scan_*.json; do
            if [ -f "$f" ]; then
              T=$(jq -r '.total_findings // 0' "$f" 2>/dev/null || echo 0)
              C=$(jq -r '.severity_breakdown.CRITICAL // 0' "$f" 2>/dev/null || echo 0)
              H=$(jq -r '.severity_breakdown.HIGH // 0' "$f" 2>/dev/null || echo 0)
              
              TOTAL=$((TOTAL + T))
              CRIT=$((CRIT + C))
              HIGH=$((HIGH + H))
            fi
          done
          
          echo "total_findings=$TOTAL" >> $GITHUB_OUTPUT
          echo "critical=$CRIT" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          
          if [ $CRIT -gt 0 ]; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
          elif [ $HIGH -gt 5 ]; then
            echo "status=WARNING" >> $GITHUB_OUTPUT
          else
            echo "status=PASSED" >> $GITHUB_OUTPUT
          fi
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ steps.parse_results.outputs.total_findings }}';
            const critical = '${{ steps.parse_results.outputs.critical }}';
            const high = '${{ steps.parse_results.outputs.high }}';
            const status = '${{ steps.parse_results.outputs.status }}';
            
            const statusEmoji = status === 'PASSED' ? '✅' : status === 'WARNING' ? '⚠️' : '❌';
            
            const comment = `## ${statusEmoji} Atlas Synapse Security Scan
            
**Status:** ${status}  
**Total Findings:** ${total}  
**Critical:** ${critical}  
**High:** ${high}

${critical > 0 ? '⛔ CRITICAL vulnerabilities must be remediated before merge.' : ''}
${high > 5 ? '⚠️ Multiple HIGH severity issues detected.' : ''}
${total == 0 ? '🎉 No security issues detected!' : ''}

---
*Scanned by Atlas Synapse Auditor v2.0*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: aegis-scan-results
          path: scan_*.json
          retention-days: 30
      
      - name: Fail Build on Critical
        if: steps.parse_results.outputs.critical > 0
        run: |
          echo "::error::CRITICAL vulnerabilities detected"
          exit 1
